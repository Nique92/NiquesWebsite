<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Nique Systems - AI Systems</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />

  <style>
    body{
      margin:0;
      font-family:Inter,system-ui;
      background:#0b0e13;
      color:#e6e9ef;
      line-height:1.6;
    }

    .container{
      max-width:1100px;
      margin:0 auto;
      padding:0 20px;
    }

    .btn{
      padding:10px 14px;
      border-radius:10px;
      border:1px solid rgba(255,255,255,0.1);
      background:rgba(255,255,255,0.03);
      color:white;
      cursor:pointer;
    }

    .btn-primary{
      background:linear-gradient(135deg,#22d3ee,#8b5cf6);
      color:black;
      font-weight:700;
      border:none;
    }

    section{
      padding:80px 0;
    }

    h1{font-size:48px;margin:0 0 10px}
    h2{font-size:30px}

    input,textarea,select{
      width:100%;
      padding:10px;
      margin:6px 0;
      border-radius:8px;
      border:1px solid rgba(255,255,255,0.1);
      background:#111827;
      color:white;
    }

    form{
      display:grid;
      gap:10px;
      max-width:500px;
    }

    #formStatus{
      font-size:14px;
      color:#a9b1bc;
    }
  </style>
</head>

<body>

<section class="hero">
  <div class="container">
    <h1>Nique Systems</h1>
    <p>AI systems, automation, and intelligent business workflows.</p>
  </div>
</section>

<section id="contact">
  <div class="container">

    <h2>Contact</h2>

    <form id="leadForm">

      <input name="name" placeholder="Name" required />
      <input name="email" placeholder="Email" required />

      <select name="intent">
        <option value="I know what I need">I know what I need</option>
        <option value="I need help choosing">I need help choosing</option>
        <option value="I want strategic guidance">I want strategic guidance</option>
      </select>

      <textarea name="message" placeholder="Describe your goals"></textarea>

      <button class="btn btn-primary" type="submit">Send</button>

      <div id="formStatus"></div>

    </form>

  </div>
</section>

<script>
document.getElementById("leadForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  const form = e.target;

  const data = {
    name: form.name.value,
    email: form.email.value,
    intent: form.intent.value,
    message: form.message.value
  };

  const status = document.getElementById("formStatus");
  status.innerText = "Sending...";

  try {
    await fetch("YOUR_N8N_WEBHOOK_URL_HERE", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(data)
    });

    status.innerText = "Sent successfully. We will contact you shortly.";
    form.reset();

  } catch (err) {
    console.error(err);
    status.innerText = "Error sending form. Please try again.";
  }
});
</script>

</body>
</html>
